<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="To-Do" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>To-Do List</title>
<style>
  :root {
    --bg-grad-start: #0b0d12;
    --bg-grad-end: #131726;
    --panel: #161922;
    --panel-2: #1c2030;
    --panel-border: #262b3a;
    --text: #e8eaf0;
    --text-dim: #8b91a3;
    --text-faint: #565a6b;
    --accent-1: #6366f1;
    --accent-2: #8b5cf6;
    --prio-1: #C97064;
    --prio-2: #D4A55D;
    --prio-3: #7DA87D;
    --danger: #ef4444;
    --success: #4ade80;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.45;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  button, input, textarea, select {
    font-family: inherit; font-size: inherit; color: inherit;
  }
  button { cursor: pointer; }
  input, textarea, select {
    background: var(--panel-2); border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 10px 12px; color: var(--text);
    outline: none; transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent-1); }
  textarea { min-height: 70px; resize: vertical; }

  /* Layout */
  .container { max-width: 760px; margin: 0 auto; padding: 16px 14px 100px; }
  header.app-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 14px;
  }
  h1 {
    margin: 0; font-size: 24px; letter-spacing: -0.01em;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sync-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-dim);
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); }
  .sync-dot.connected { background: var(--success); }
  .sync-dot.error { background: var(--danger); }

  /* Tabs */
  nav.tabs {
    display: flex; gap: 4px; margin-bottom: 14px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; padding-bottom: 4px;
  }
  nav.tabs button {
    background: var(--panel); color: var(--text-dim);
    border: 1px solid var(--panel-border); border-radius: 999px;
    padding: 7px 14px; font-size: 13px; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  /* Colored tabs — each has its own hue */
  nav.tabs button.tab-today {
    color: #a5b4fc; border-color: rgba(99,102,241,0.30);
    background: rgba(99,102,241,0.06);
  }
  nav.tabs button.tab-today.active {
    color: #e0e7ff; background: rgba(99,102,241,0.28);
    border-color: rgba(99,102,241,0.7);
    box-shadow: 0 0 0 1px rgba(99,102,241,0.25);
  }
  nav.tabs button.tab-upcoming {
    color: #facc15; border-color: rgba(212,165,93,0.35);
    background: rgba(212,165,93,0.06);
  }
  nav.tabs button.tab-upcoming.active {
    color: #fde68a; background: rgba(212,165,93,0.28);
    border-color: rgba(212,165,93,0.75);
    box-shadow: 0 0 0 1px rgba(212,165,93,0.25);
  }
  nav.tabs button.tab-all {
    color: #c4b5fd; border-color: rgba(139,92,246,0.35);
    background: rgba(139,92,246,0.06);
  }
  nav.tabs button.tab-all.active {
    color: #ede9fe; background: rgba(139,92,246,0.28);
    border-color: rgba(139,92,246,0.75);
    box-shadow: 0 0 0 1px rgba(139,92,246,0.25);
  }
  nav.tabs button.tab-done {
    color: #86efac; border-color: rgba(74,222,128,0.35);
    background: rgba(74,222,128,0.06);
  }
  nav.tabs button.tab-done.active {
    color: #dcfce7; background: rgba(74,222,128,0.28);
    border-color: rgba(74,222,128,0.75);
    box-shadow: 0 0 0 1px rgba(74,222,128,0.25);
  }
  nav.tabs button.tab-settings.active {
    color: var(--text); background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.25);
  }

  /* Quick add */
  .quick-add {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 12px; margin-bottom: 16px;
    display: flex; gap: 8px; align-items: center;
  }
  .quick-add input { flex: 1; }
  .quick-add button.primary {
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    border: none; color: white; font-weight: 600;
    padding: 11px 16px; border-radius: 10px; white-space: nowrap;
  }
  .quick-add button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Task card */
  .task {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .task.done { opacity: 0.55; }
  .task.expanded { border-color: rgba(99,102,241,0.35); }
  .task-head { display: flex; align-items: flex-start; gap: 12px; }
  .check-btn {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--text-dim); background: transparent;
    padding: 0; display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
  }
  .check-btn.done { background: var(--success); border-color: var(--success); }
  .check-btn.done::after { content: "✓"; color: #0b0d12; font-weight: bold; font-size: 13px; }
  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 15px; color: var(--text); cursor: pointer;
    word-break: break-word;
  }
  .task-title.done { text-decoration: line-through; color: var(--text-dim); }
  .task-meta {
    font-size: 12px; color: var(--text-dim); margin-top: 4px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  }
  .chip {
    padding: 2px 8px; border-radius: 999px; font-size: 11px;
    background: rgba(255,255,255,0.06); color: var(--text-dim);
  }
  .badge {
    flex-shrink: 0; padding: 3px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 700; color: #1a1a1a;
  }
  .badge.p1 { background: var(--prio-1); }
  .badge.p2 { background: var(--prio-2); }
  .badge.p3 { background: var(--prio-3); }
  .deadline-warning { color: var(--prio-1); font-weight: 600; }
  .deadline-soon { color: var(--prio-2); font-weight: 600; }
  .meta-icons { display: flex; gap: 8px; color: var(--text-faint); font-size: 11px; }

  /* Expanded task details */
  .task-details {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--panel-border);
    display: none; flex-direction: column; gap: 12px;
  }
  .task.expanded .task-details { display: flex; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 11px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.06em; font-weight: 600;
  }
  .field-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .field-row > div { flex: 1; min-width: 120px; }

  /* Subtasks */
  .subtask-list { display: flex; flex-direction: column; gap: 4px; }
  .subtask {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0;
  }
  .subtask input[type="text"] { flex: 1; padding: 6px 10px; font-size: 13px; }
  .subtask-check {
    width: 16px; height: 16px; flex-shrink: 0; border-radius: 4px;
    border: 1.5px solid var(--text-dim); background: transparent;
    padding: 0; display: flex; align-items: center; justify-content: center;
  }
  .subtask-check.done { background: var(--success); border-color: var(--success); }
  .subtask-check.done::after { content: "✓"; color: #0b0d12; font-size: 10px; font-weight: bold; }
  .subtask.done input[type="text"] { color: var(--text-dim); text-decoration: line-through; }
  .icon-btn {
    background: transparent; border: none; color: var(--text-dim);
    padding: 6px; border-radius: 6px;
  }
  .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .icon-btn.danger:hover { color: var(--danger); }

  /* Links */
  .link-row { display: flex; gap: 6px; align-items: center; }
  .link-row input { padding: 8px 10px; font-size: 13px; }
  .link-row a {
    color: var(--accent-1); font-size: 13px; word-break: break-all;
    text-decoration: none;
  }
  .link-row a:hover { text-decoration: underline; }

  /* Files */
  .file-grid { display: flex; flex-direction: column; gap: 6px; }
  .file-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    background: var(--panel-2); border-radius: 8px; font-size: 13px;
  }
  .file-item .file-name { flex: 1; color: var(--text); word-break: break-all; }
  .file-item .file-size { color: var(--text-faint); font-size: 11px; }
  .file-drop {
    border: 1.5px dashed var(--panel-border); border-radius: 10px;
    padding: 14px; text-align: center; color: var(--text-dim);
    font-size: 13px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .file-drop:hover, .file-drop.dragover {
    border-color: var(--accent-1); background: rgba(99,102,241,0.05);
  }
  .file-drop input { display: none; }
  .upload-progress {
    background: var(--panel-2); border-radius: 6px; height: 4px; overflow: hidden;
  }
  .upload-progress-bar {
    height: 100%; background: var(--accent-1); width: 0%; transition: width 0.2s;
  }

  /* Action buttons */
  .action-row { display: flex; gap: 8px; justify-content: flex-end; }
  .btn {
    padding: 8px 14px; border-radius: 8px; font-size: 13px;
    border: 1px solid var(--panel-border); background: var(--panel-2);
    color: var(--text);
  }
  .btn:hover { border-color: var(--accent-1); }
  .btn.danger { color: var(--danger); border-color: rgba(239,68,68,0.3); }
  .btn.danger:hover { background: rgba(239,68,68,0.1); }
  .btn.primary {
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    border: none; color: white; font-weight: 600;
  }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text-dim);
  }
  .empty-state .emoji { font-size: 36px; margin-bottom: 8px; }

  /* Settings panel */
  .settings-section {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 16px; margin-bottom: 14px;
  }
  .settings-section h2 {
    margin: 0 0 12px; font-size: 14px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-dim);
  }
  .cat-row {
    display: flex; align-items: center; gap: 8px; padding: 8px 0;
    border-bottom: 1px solid var(--panel-border);
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-row input { flex: 1; padding: 8px 10px; font-size: 13px; }
  .cat-emoji-input { max-width: 60px; text-align: center; flex: 0 0 60px; }
  .cat-parent-select {
    flex: 0 1 180px; max-width: 180px; padding: 7px 8px; font-size: 12px;
    background: var(--panel-2); border: 1px solid var(--panel-border);
    border-radius: 8px; color: var(--text-dim);
  }
  .cat-parent-select:focus { color: var(--text); border-color: var(--accent-1); }
  .nest-indicator {
    color: var(--text-faint); font-size: 14px; margin-right: -2px;
    user-select: none;
  }
  @media (max-width: 540px) {
    .cat-parent-select { flex-basis: 110px; max-width: 110px; }
  }

  /* ====== Mode switcher (To-Do / To-Pay) ====== */
  .mode-switch {
    display: flex; gap: 4px; padding: 4px;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 999px; margin: 0 auto 14px;
    width: fit-content;
  }
  .mode-btn {
    background: transparent; color: var(--text-dim);
    border: none; padding: 8px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    transition: background 0.2s, color 0.2s, transform 0.1s;
  }
  .mode-btn:hover { color: var(--text); }
  .mode-btn:active { transform: scale(0.97); }
  .mode-btn.active {
    color: white;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
  }

  /* ====== Bills ====== */
  .bill-summary {
    background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.20);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
    display: flex; gap: 18px; flex-wrap: wrap; font-size: 13px;
    color: var(--text-dim);
  }
  .bill-summary strong {
    color: var(--text); font-variant-numeric: tabular-nums; font-weight: 700;
  }
  .bill {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .bill.paid { opacity: 0.6; }
  .bill.expanded { border-color: rgba(99,102,241,0.35); }
  .bill-head {
    display: flex; align-items: center; gap: 12px;
  }
  .bill-logo {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--panel-2); flex-shrink: 0;
    object-fit: contain; padding: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; overflow: hidden;
  }
  .bill-logo img { width: 100%; height: 100%; object-fit: contain; }
  .bill-body { flex: 1; min-width: 0; cursor: pointer; }
  .bill-title {
    font-size: 15px; color: var(--text); font-weight: 600;
    word-break: break-word;
  }
  .bill-meta {
    font-size: 12px; color: var(--text-dim); margin-top: 3px;
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .bill-amount {
    font-size: 16px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums; flex-shrink: 0;
    text-align: right;
  }
  .bill-amount .freq {
    font-size: 11px; color: var(--text-dim); font-weight: 500;
    margin-left: 2px; display: block; margin-top: 1px;
  }
  .bill-pay-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--text-dim); background: transparent;
    padding: 0; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bill-pay-btn.paid { background: var(--success); border-color: var(--success); }
  .bill-pay-btn.paid::after { content: "✓"; color: #0b0d12; font-weight: bold; font-size: 14px; }
  .bill-details {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--panel-border);
    display: none; flex-direction: column; gap: 12px;
  }
  .bill.expanded .bill-details { display: flex; }
  .bill-contact-grid {
    display: grid; grid-template-columns: 110px 1fr;
    gap: 6px 12px; font-size: 13px;
  }
  .bill-contact-grid .label {
    color: var(--text-dim); font-weight: 500;
  }
  .bill-contact-grid .value { color: var(--text); word-break: break-all; }
  .bill-contact-grid a { color: var(--accent-1); text-decoration: none; }
  .bill-contact-grid a:hover { text-decoration: underline; }
  .lookup-spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--text-faint); border-top-color: var(--accent-1);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-left: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .deadline-overdue { color: var(--prio-1); font-weight: 600; }
  .chip-cat { color: var(--text-dim); font-size: 11px; }
  @media (max-width: 540px) {
    .bill-contact-grid { grid-template-columns: 1fr; gap: 2px; }
    .bill-contact-grid .label { margin-top: 6px; }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 10px 16px; font-size: 13px;
    color: var(--text); z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; opacity: 0;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.error { border-color: rgba(239,68,68,0.5); }

  /* Setup notice */
  .setup-notice {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 12px; padding: 14px; margin-bottom: 14px;
    color: var(--text); font-size: 13px;
  }
  .setup-notice h3 { margin: 0 0 6px; color: var(--prio-1); font-size: 14px; }
  .setup-notice code {
    background: var(--panel-2); padding: 2px 6px; border-radius: 4px;
    font-size: 12px;
  }

  @media (max-width: 540px) {
    h1 { font-size: 20px; }
    .container { padding: 12px 10px 100px; }
    .task { padding: 10px 12px; }
    .quick-add { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="app-header">
    <h1 id="app-title">📋 To-Do List</h1>
    <div class="sync-status">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-text">connecting…</span>
    </div>
  </header>

  <div id="setup-notice" class="setup-notice" style="display:none">
    <h3>⚠️ Firebase not configured</h3>
    <p style="margin:0">Open <code>index.html</code> and paste your Firebase project's config into the <code>firebaseConfig</code> object near the bottom of the file. See <code>SETUP.md</code> for the 5-minute walkthrough.</p>
  </div>

  <div class="mode-switch" id="mode-switch">
    <button class="mode-btn active" data-mode="todo">📋 To-Do</button>
    <button class="mode-btn" data-mode="bills">💵 To-Pay</button>
  </div>

  <!-- ===== TO-DO MODE ===== -->
  <div id="todo-mode">
    <nav class="tabs" id="tabs">
      <button class="tab-today active" data-filter="today">☀️ Today</button>
      <button class="tab-upcoming" data-filter="upcoming">📆 Upcoming</button>
      <button class="tab-all" data-filter="all">🌌 All</button>
      <button class="tab-done" data-filter="done">✅ Done</button>
      <button class="tab-settings" data-filter="settings">⚙️ Settings</button>
    </nav>

    <div class="quick-add" id="quick-add">
      <input id="qa-title" type="text" placeholder="Add a task and press Enter…" />
      <button class="primary" id="qa-add">Add</button>
    </div>

    <div id="task-list"></div>
    <div id="settings-view" style="display:none"></div>
  </div>

  <!-- ===== TO-PAY MODE ===== -->
  <div id="bills-mode" style="display:none">
    <div class="bill-summary" id="bill-summary">
      <span>Monthly burn: <strong id="bs-monthly">$0</strong></span>
      <span>Due this month: <strong id="bs-due-month">$0</strong></span>
      <span>Open bills: <strong id="bs-open-count">0</strong></span>
    </div>

    <nav class="tabs" id="bill-tabs">
      <button class="tab-today active" data-bill-filter="month">📅 This Month</button>
      <button class="tab-upcoming" data-bill-filter="upcoming">⏭️ Upcoming</button>
      <button class="tab-all" data-bill-filter="all">💳 All</button>
      <button class="tab-done" data-bill-filter="paid">✅ Paid</button>
      <button class="tab-settings" data-bill-filter="settings">⚙️ Settings</button>
    </nav>

    <div class="quick-add" id="bill-quick-add">
      <input id="bill-qa-url" type="text" placeholder="Paste a company URL or type a name… (e.g. netflix.com)" />
      <button class="primary" id="bill-qa-add">Add</button>
    </div>

    <div id="bills-list"></div>
    <div id="bills-settings-view" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ⬆️ END CONFIG ⬆️

const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "PASTE_API_KEY_HERE";

const DEFAULT_CATEGORIES = [
  { name: "Work", emoji: "💼" },
  { name: "Finance", emoji: "💰" },
  { name: "Side Projects", emoji: "🚀" }
];

// ----- State -----
let app, db;
let mode = localStorage.getItem("td-mode") || "todo";
let tasks = [];
let categories = [];
let currentFilter = "today";
let expandedId = null;
let bills = [];
let billCategories = [];
let currentBillFilter = "month";
let expandedBillId = null;

const DEFAULT_BILL_CATEGORIES = [
  { name: "Utilities", emoji: "⚡" },
  { name: "Phone", emoji: "📱" },
  { name: "Internet", emoji: "🌐" },
  { name: "Streaming", emoji: "📺" },
  { name: "Software", emoji: "💻" },
  { name: "Memberships", emoji: "🎟️" },
  { name: "Insurance", emoji: "🛡️" },
  { name: "Credit Cards", emoji: "💳" },
  { name: "Loans", emoji: "🏦" },
  { name: "Rent / Mortgage", emoji: "🏠" },
  { name: "Auto", emoji: "🚗" }
];

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const todayISO = () => new Date().toISOString().slice(0, 10);
const addDaysISO = (n) => {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
};
const fmtDate = (iso) => {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
};
const fmtSize = (b) => {
  if (b < 1024) return b + " B";
  if (b < 1024*1024) return (b/1024).toFixed(1) + " KB";
  return (b/1024/1024).toFixed(1) + " MB";
};

function toast(msg, isError = false) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.toggle("error", isError);
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2400);
}

function setSyncStatus(state, text) {
  const dot = $("#sync-dot");
  dot.classList.remove("connected", "error");
  if (state === "connected") dot.classList.add("connected");
  if (state === "error") dot.classList.add("error");
  $("#sync-text").textContent = text;
}

// ----- Firebase init -----
if (FIREBASE_CONFIGURED) {
  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    setSyncStatus("connecting", "syncing…");
    initSubscriptions();
  } catch (e) {
    console.error(e);
    setSyncStatus("error", "config error");
    toast("Firebase config error: " + e.message, true);
  }
} else {
  $("#setup-notice").style.display = "block";
  setSyncStatus("error", "not configured");
}

function initSubscriptions() {
  // Categories
  const catsRef = collection(db, "categories");
  onSnapshot(catsRef, async (snap) => {
    categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (categories.length === 0) {
      // First-time seed
      for (const c of DEFAULT_CATEGORIES) {
        await addDoc(catsRef, c);
      }
    }
    render();
  }, (err) => {
    setSyncStatus("error", "sync error");
    toast("Categories sync error: " + err.message, true);
  });

  // Tasks
  const tasksRef = query(collection(db, "tasks"), orderBy("createdAt", "desc"));
  onSnapshot(tasksRef, (snap) => {
    tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setSyncStatus("connected", "synced");
    render();
  }, (err) => {
    setSyncStatus("error", "sync error");
    toast("Tasks sync error: " + err.message, true);
  });

  // Bill categories
  const billCatsRef = collection(db, "bill_categories");
  onSnapshot(billCatsRef, async (snap) => {
    billCategories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (billCategories.length === 0) {
      for (const c of DEFAULT_BILL_CATEGORIES) {
        await addDoc(billCatsRef, { ...c, parentId: null });
      }
    }
    if (mode === "bills") render();
  });

  // Bills
  const billsRef = query(collection(db, "bills"), orderBy("createdAt", "desc"));
  onSnapshot(billsRef, (snap) => {
    bills = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (mode === "bills") render();
  }, (err) => {
    toast("Bills sync error: " + err.message, true);
  });
}

// ----- Task CRUD -----
async function addTask(title) {
  if (!title.trim()) return;
  if (!FIREBASE_CONFIGURED) return toast("Configure Firebase first", true);
  try {
    await addDoc(collection(db, "tasks"), {
      title: title.trim(),
      category: categories[0]?.name || "",
      priority: "P3",
      deadline: null,
      status: "open",
      notes: "",
      links: [],
      files: [],
      subtasks: [],
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
  } catch (e) {
    toast("Add failed: " + e.message, true);
  }
}

async function updateTask(id, patch) {
  try {
    await updateDoc(doc(db, "tasks", id), { ...patch, updatedAt: serverTimestamp() });
  } catch (e) {
    toast("Update failed: " + e.message, true);
  }
}

async function deleteTask(t) {
  if (!confirm(`Delete "${t.title}"?`)) return;
  try {
    await deleteDoc(doc(db, "tasks", t.id));
    toast("Deleted");
  } catch (e) {
    toast("Delete failed: " + e.message, true);
  }
}

async function toggleDone(t) {
  await updateTask(t.id, { status: t.status === "done" ? "open" : "done" });
}

// ----- Obsidian file references -----
// Files are not uploaded. Each entry stores a label + an obsidian:// URI or any URL
// pointing at a file in the user's Obsidian vault.
async function removeFile(t, fileIdx) {
  const f = t.files[fileIdx];
  if (!confirm(`Remove "${f.name || 'file reference'}"?`)) return;
  const newFiles = t.files.filter((_, i) => i !== fileIdx);
  await updateTask(t.id, { files: newFiles });
}

// ----- Filter -----
function filterTasks() {
  const today = todayISO();
  const in7 = addDaysISO(7);
  if (currentFilter === "today") {
    return tasks.filter(t => t.status === "open" && (
      (t.deadline && t.deadline <= today) ||
      t.priority === "P1"
    ));
  }
  if (currentFilter === "upcoming") {
    return tasks.filter(t => t.status === "open" && t.deadline && t.deadline > today && t.deadline <= in7);
  }
  if (currentFilter === "all") {
    return tasks.filter(t => t.status === "open");
  }
  if (currentFilter === "done") {
    return tasks.filter(t => t.status === "done");
  }
  return tasks;
}

// ----- Render -----
function render() {
  // Switch between modes
  if (mode === "bills") {
    $("#todo-mode").style.display = "none";
    $("#bills-mode").style.display = "block";
    $("#app-title").textContent = "💵 To-Pay List";
    renderBillsView();
    return;
  }
  $("#todo-mode").style.display = "block";
  $("#bills-mode").style.display = "none";
  $("#app-title").textContent = "📋 To-Do List";
  if (currentFilter === "settings") {
    $("#task-list").style.display = "none";
    $("#quick-add").style.display = "none";
    $("#settings-view").style.display = "block";
    renderSettings();
  } else {
    $("#task-list").style.display = "block";
    $("#quick-add").style.display = "flex";
    $("#settings-view").style.display = "none";
    renderTasks();
  }
}

function renderBillsView() {
  // Top summary
  const openBills = bills.filter(b => b.status !== "paid");
  const monthlyBurn = bills
    .filter(b => b.frequency === "monthly")
    .reduce((s, b) => s + (Number(b.amount) || 0), 0);
  const today = todayISO();
  const monthEnd = lastDayOfMonth();
  const dueThisMonth = openBills
    .filter(b => b.dueDate && b.dueDate <= monthEnd)
    .reduce((s, b) => s + (Number(b.amount) || 0), 0);
  $("#bs-monthly").textContent = "$" + monthlyBurn.toFixed(2);
  $("#bs-due-month").textContent = "$" + dueThisMonth.toFixed(2);
  $("#bs-open-count").textContent = openBills.length;

  if (currentBillFilter === "settings") {
    $("#bills-list").style.display = "none";
    $("#bill-quick-add").style.display = "none";
    $("#bills-settings-view").style.display = "block";
    renderBillsSettings();
  } else {
    $("#bills-list").style.display = "block";
    $("#bill-quick-add").style.display = "flex";
    $("#bills-settings-view").style.display = "none";
    renderBills();
  }
}

function renderTasks() {
  const list = filterTasks();
  const root = $("#task-list");
  if (list.length === 0) {
    const empty = {
      today: { e: "✨", m: "Nothing for today. Add one above." },
      upcoming: { e: "📅", m: "Nothing coming up in the next 7 days." },
      all: { e: "🎉", m: "Inbox zero. Add a task above." },
      done: { e: "📥", m: "No completed tasks yet." }
    }[currentFilter];
    root.innerHTML = `<div class="empty-state"><div class="emoji">${empty.e}</div><div>${empty.m}</div></div>`;
    return;
  }
  // Sort: P1 first, then by deadline (no-deadline last)
  const sorted = [...list].sort((a, b) => {
    const pa = parseInt((a.priority||"P3").slice(1));
    const pb = parseInt((b.priority||"P3").slice(1));
    if (pa !== pb) return pa - pb;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  root.innerHTML = sorted.map(taskHtml).join("");
  // Re-bind events
  sorted.forEach(t => bindTaskEvents(t));
}

function taskHtml(t) {
  const isExpanded = expandedId === t.id;
  const isDone = t.status === "done";
  const today = todayISO();
  const p = (t.priority || "P3").toLowerCase();
  let deadlineCls = "";
  if (t.deadline && !isDone) {
    if (t.deadline < today) deadlineCls = "deadline-warning";
    else if (t.deadline === today) deadlineCls = "deadline-warning";
    else if (t.deadline <= addDaysISO(7)) deadlineCls = "deadline-soon";
  }
  const cat = getCatByName(t.category);
  const catLabel = cat ? categoryBreadcrumb(cat) : (t.category || "");
  const subOpen = (t.subtasks || []).filter(s => !s.done).length;
  const subTotal = (t.subtasks || []).length;
  const fileCount = (t.files || []).length;
  const linkCount = (t.links || []).length;

  return `
  <div class="task ${isExpanded ? 'expanded' : ''} ${isDone ? 'done' : ''}" data-id="${t.id}">
    <div class="task-head">
      <button class="check-btn ${isDone ? 'done' : ''}" data-action="toggle-done"></button>
      <div class="task-body">
        <div class="task-title ${isDone ? 'done' : ''}" data-action="expand">${escapeHtml(t.title)}</div>
        <div class="task-meta">
          ${catLabel ? `<span class="chip">${escapeHtml(catLabel)}</span>` : ""}
          ${t.deadline ? `<span class="${deadlineCls}">📅 ${fmtDate(t.deadline)}</span>` : ""}
          ${subTotal ? `<span class="meta-icons">☑ ${subTotal - subOpen}/${subTotal}</span>` : ""}
          ${linkCount ? `<span class="meta-icons">🔗 ${linkCount}</span>` : ""}
          ${fileCount ? `<span class="meta-icons">📎 ${fileCount}</span>` : ""}
        </div>
      </div>
      <span class="badge ${p}">${(t.priority||"P3")}</span>
    </div>
    ${isExpanded ? detailsHtml(t) : ""}
  </div>`;
}

      <div class="field-row">

    </div>
  `;
}

function bindTaskEvents(t) {
  const root = document.querySelector(`.task[data-id="${t.id}"]`);
  if (!root) return;
  root.querySelectorAll("[data-action]").forEach(el => {
    const action = el.dataset.action;
    if (action === "toggle-done") el.onclick = () => toggleDone(t);
    if (action === "expand") el.onclick = () => { expandedId = expandedId === t.id ? null : t.id; render(); };
    if (action === "collapse") el.onclick = () => { expandedId = null; render(); };
    if (action === "delete") el.onclick = () => deleteTask(t);
    if (action === "edit-title") el.onchange = () => updateTask(t.id, { title: el.value });
    if (action === "edit-category") el.onchange = () => updateTask(t.id, { category: el.value });
    if (action === "edit-priority") el.onchange = () => updateTask(t.id, { priority: el.value });
    if (action === "edit-deadline") el.onchange = () => updateTask(t.id, { deadline: el.value || null });
    if (action === "edit-notes") el.onblur = () => updateTask(t.id, { notes: el.value });

    if (action === "toggle-sub") el.onclick = () => {
      const idx = parseInt(el.closest("[data-sub-idx]").dataset.subIdx);
      const subs = [...(t.subtasks || [])];
      subs[idx] = { ...subs[idx], done: !subs[idx].done };
      updateTask(t.id, { subtasks: subs });
    };
    if (action === "edit-sub") el.onchange = () => {
      const idx = parseInt(el.closest("[data-sub-idx]").dataset.subIdx);
      const subs = [...(t.subtasks || [])];
      subs[idx] = { ...subs[idx], title: el.value };
      updateTask(t.id, { subtasks: subs });
    };
    if (action === "del-sub") el.onclick = () => {
      const idx = parseInt(el.closest("[data-sub-idx]").dataset.subIdx);
      const subs = (t.subtasks || []).filter((_, i) => i !== idx);
      updateTask(t.id, { subtasks: subs });
    };
    if (action === "add-sub") el.onkeydown = (e) => {
      if (e.key === "Enter" && el.value.trim()) {
        const subs = [...(t.subtasks || []), { title: el.value.trim(), done: false }];
        updateTask(t.id, { subtasks: subs });
        el.value = "";
      }
    };

    if (action === "edit-link-label") el.onchange = () => {
      const idx = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = [...(t.links || [])];
      links[idx] = { ...links[idx], label: el.value };
      updateTask(t.id, { links });
    };
    if (action === "edit-link-url") el.onchange = () => {
      const idx = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = [...(t.links || [])];
      links[idx] = { ...links[idx], url: el.value };
      updateTask(t.id, { links });
    };
    if (action === "del-link") el.onclick = () => {
      const idx = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = (t.links || []).filter((_, i) => i !== idx);
      updateTask(t.id, { links });
    };
    if (action === "add-link") el.onclick = () => {
      const links = [...(t.links || []), { label: "", url: "" }];
      updateTask(t.id, { links });
    };

    if (action === "edit-file-name") el.onchange = () => {
      const idx = parseInt(el.closest("[data-file-idx]").dataset.fileIdx);
      const files = [...(t.files || [])];
      files[idx] = { ...files[idx], name: el.value };
      updateTask(t.id, { files });
    };
    if (action === "edit-file-url") el.onchange = () => {
      const idx = parseInt(el.closest("[data-file-idx]").dataset.fileIdx);
      const files = [...(t.files || [])];
      files[idx] = { ...files[idx], url: el.value };
      updateTask(t.id, { files });
    };
    if (action === "del-file") el.onclick = () => {
      const idx = parseInt(el.closest("[data-file-idx]").dataset.fileIdx);
      removeFile(t, idx);
    };
    if (action === "add-file") el.onclick = () => {
      const files = [...(t.files || []), { name: "", url: "" }];
      updateTask(t.id, { files });
    };
  });
}

function renderSettings() {
  const root = $("#settings-view");
  const tree = sortedCategoriesTree();
  const catsHtml = tree.map(c => {
    const depth = categoryDepth(c);
    const indent = depth * 22;
    const descendants = getDescendants(c.id);
    descendants.add(c.id);
    const parentOpts = ['<option value="">— top level —</option>']
      .concat(categories
        .filter(p => !descendants.has(p.id))
        .sort((a, b) => categoryBreadcrumb(a).localeCompare(categoryBreadcrumb(b)))
        .map(p => `<option value="${p.id}" ${c.parentId === p.id ? 'selected' : ''}>${escapeHtml(categoryBreadcrumb(p))}</option>`))
      .join('');
    const indicator = depth ? `<span class="nest-indicator">↳</span>` : "";
    return `
      <div class="cat-row" data-cat-id="${c.id}" style="margin-left:${indent}px">
        ${indicator}
        <input class="cat-emoji-input" type="text" value="${escapeHtml(c.emoji || "")}" data-cat-action="emoji" maxlength="4" />
        <input type="text" value="${escapeHtml(c.name)}" data-cat-action="name" />
        <select data-cat-action="parent" class="cat-parent-select" title="Parent category">${parentOpts}</select>
        <button class="icon-btn danger" data-cat-action="delete">×</button>
      </div>
    `;
  }).join("");
  root.innerHTML = `
    <div class="settings-section">
      <h2>Categories</h2>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">
        Pick a parent to nest a category. Set to <em>top level</em> to unnest.
      </div>
      ${catsHtml}
      <div class="cat-row" style="border-top:1px solid var(--panel-border);margin-top:10px;padding-top:14px">
        <input class="cat-emoji-input" type="text" placeholder="📁" id="new-cat-emoji" maxlength="4" />
        <input type="text" placeholder="New category name" id="new-cat-name" />
        <button class="btn primary" id="add-cat-btn">Add</button>
      </div>
    </div>
    <div class="settings-section">
      <h2>About</h2>
      <p style="margin:0;color:var(--text-dim);font-size:13px;line-height:1.6">
        Data lives in Firebase Firestore. File attachments use <code style="background:var(--panel-2);padding:1px 5px;border-radius:3px">obsidian://</code> deep-links. Sync is real-time across all devices. Open this URL on any phone or computer to see the same list. Categories can be nested — set a parent above to make one a sub-category of another.
      </p>
    </div>
  `;
  root.querySelectorAll("[data-cat-id]").forEach(row => {
    const id = row.dataset.catId;
    const cat = categories.find(c => c.id === id);
    row.querySelectorAll("[data-cat-action]").forEach(el => {
      const action = el.dataset.catAction;
      if (action === "emoji") el.onchange = () => updateDoc(doc(db, "categories", id), { emoji: el.value });
      if (action === "name") el.onchange = () => updateDoc(doc(db, "categories", id), { name: el.value });
      if (action === "parent") el.onchange = () => updateDoc(doc(db, "categories", id), { parentId: el.value || null });
      if (action === "delete") el.onclick = async () => {
        const kidCount = categories.filter(k => k.parentId === id).length;
        const warn = kidCount ? `\n\n⚠ This category has ${kidCount} sub-categor${kidCount === 1 ? 'y' : 'ies'} — they'll become top-level if you continue.` : "";
        if (!confirm(`Delete category "${cat.name}"?${warn}`)) return;
        // Promote children to top-level
        for (const k of categories.filter(k => k.parentId === id)) {
          await updateDoc(doc(db, "categories", k.id), { parentId: null });
        }
        await deleteDoc(doc(db, "categories", id));
      };
    });
  });
  $("#add-cat-btn").onclick = async () => {
    const emoji = $("#new-cat-emoji").value.trim() || "📁";
    const name = $("#new-cat-name").value.trim();
    if (!name) return toast("Name required", true);
    await addDoc(collection(db, "categories"), { name, emoji, parentId: null });
    $("#new-cat-name").value = ""; $("#new-cat-emoji").value = "";
  };
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// ----- Category tree helpers -----
function getCatById(id) { return categories.find(c => c.id === id); }
function getCatByName(name) { return categories.find(c => c.name === name); }
function categoryPath(cat) {
  // Returns chain from root → leaf as array of category objects
  const path = []; let cur = cat; let guard = 0;
  while (cur && guard++ < 12) {
    path.unshift(cur);
    cur = cur.parentId ? getCatById(cur.parentId) : null;
  }
  return path;
}
function categoryDepth(cat) { return Math.max(0, categoryPath(cat).length - 1); }
function getDescendants(catId) {
  const result = new Set(); const queue = [catId];
  while (queue.length) {
    const id = queue.shift();
    for (const c of categories) if (c.parentId === id && !result.has(c.id)) {
      result.add(c.id); queue.push(c.id);
    }
  }
  return result;
}
function sortedCategoriesTree() {
  // Returns categories in tree order: each parent immediately followed by its children
  const result = [];
  function walk(parentId) {
    const children = categories
      .filter(c => (c.parentId || null) === (parentId || null))
      .sort((a, b) => (a.name || "").localeCompare(b.name || ""));
    for (const child of children) { result.push(child); walk(child.id); }
  }
  walk(null);
  // Append any orphans whose parentId points at a missing category
  for (const c of categories) if (!result.includes(c)) result.push(c);
  return result;
}
function categoryBreadcrumb(cat, sep = " / ") {
  return categoryPath(cat).map(p => `${p.emoji || ""} ${p.name}`.trim()).join(sep);
}

function lastDayOfMonth() {
  const d = new Date(); const end = new Date(d.getFullYear(), d.getMonth()+1, 0);
  return end.toISOString().slice(0, 10);
}
function fmtMoney(n) {
  const v = Number(n) || 0;
  return "$" + v.toFixed(2);
}
function extractDomain(url) {
  try {
    let u = url.trim();
    if (!/^https?:\/\//i.test(u)) u = "https://" + u;
    const parsed = new URL(u);
    return parsed.hostname.replace(/^www\./, "");
  } catch (e) { return ""; }
}
function advanceDate(iso, frequency) {
  if (!iso) return iso;
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  if (frequency === "weekly") d.setDate(d.getDate() + 7);
  else if (frequency === "monthly") d.setMonth(d.getMonth() + 1);
  else if (frequency === "quarterly") d.setMonth(d.getMonth() + 3);
  else if (frequency === "yearly") d.setFullYear(d.getFullYear() + 1);
  return d.toISOString().slice(0, 10);
}

// ----- URL lookup: best-effort, uses Clearbit logo + public CORS proxy -----
async function lookupCompany(rawUrl) {
  const result = { logoUrl: "", name: "", description: "", phone: "", email: "", address: "", url: "" };
  const domain = extractDomain(rawUrl);
  if (!domain) return result;
  result.url = "https://" + domain;
  result.logoUrl = "https://logo.clearbit.com/" + domain;
  // Auto-derive a clean name from domain (e.g. "netflix" → "Netflix")
  result.name = domain.split(".")[0].replace(/^./, c => c.toUpperCase());
  // Try to fetch the page through a public CORS proxy and extract richer info
  try {
    const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://" + domain + "/");
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 8000);
    const r = await fetch(proxy, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) return result;
    const data = await r.json();
    const html = (data && data.contents) || "";
    if (!html) return result;
    // og:site_name → name, og:title → fallback, og:description → description
    const grab = (re) => { const m = html.match(re); return m ? m[1].trim() : ""; };
    const siteName = grab(/<meta[^>]+property=["']og:site_name["'][^>]+content=["']([^"']+)["']/i);
    const ogTitle = grab(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i);
    const ogDesc = grab(/<meta[^>]+property=["']og:description["'][^>]+content=["']([^"']+)["']/i);
    const ogImage = grab(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i);
    if (siteName) result.name = siteName;
    else if (ogTitle && ogTitle.length < 40) result.name = ogTitle;
    if (ogDesc) result.description = ogDesc.slice(0, 200);
    if (ogImage && !result.logoUrl.includes("clearbit")) result.logoUrl = ogImage;

    // Phone: tel: links first, then loose regex
    const telMatch = html.match(/href=["']tel:([+0-9().\-\s]+)["']/i);
    if (telMatch) result.phone = telMatch[1].trim();
    else {
      const phoneRe = /(?:\+?1[-.\s]?)?\(?([0-9]{3})\)?[-.\s]?([0-9]{3})[-.\s]?([0-9]{4})/;
      const pm = html.replace(/<[^>]+>/g, " ").match(phoneRe);
      if (pm) result.phone = pm[0];
    }
    // Email: mailto: first, then regex (skip common noise)
    const mailtoMatch = html.match(/href=["']mailto:([^"']+)["']/i);
    if (mailtoMatch) result.email = mailtoMatch[1].split("?")[0];
    else {
      const emailRe = /[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}/g;
      const emails = (html.match(emailRe) || []).filter(e => !/\.(png|jpg|svg|gif|webp)$/i.test(e));
      if (emails.length) result.email = emails[0];
    }
    // Address: look for <address> tag content
    const addrMatch = html.match(/<address[^>]*>([\s\S]*?)<\/address>/i);
    if (addrMatch) {
      result.address = addrMatch[1].replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim().slice(0, 200);
    }
  } catch (e) { /* swallow — best effort */ }
  return result;
}

// ----- Bill CRUD -----
async function addBillFromInput(raw) {
  if (!raw || !raw.trim()) return;
  if (!FIREBASE_CONFIGURED) return toast("Configure Firebase first", true);
  const input = raw.trim();
  const looksLikeUrl = /\./.test(input) && !/\s/.test(input);
  const placeholder = {
    company: looksLikeUrl ? extractDomain(input).split(".")[0].replace(/^./, c => c.toUpperCase()) : input,
    url: looksLikeUrl ? ("https://" + extractDomain(input)) : "",
    domain: looksLikeUrl ? extractDomain(input) : "",
    logoUrl: looksLikeUrl ? ("https://logo.clearbit.com/" + extractDomain(input)) : "",
    category: billCategories[0]?.name || "",
    amount: 0,
    currency: "$",
    frequency: "monthly",
    dueDate: null,
    status: "open",
    accountNumber: "",
    phone: "",
    email: "",
    address: "",
    description: "",
    notes: "",
    links: [],
    files: [],
    lookupStatus: looksLikeUrl ? "pending" : "",
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp()
  };
  try {
    const ref = await addDoc(collection(db, "bills"), placeholder);
    toast("Added — looking up info…");
    if (looksLikeUrl) {
      // Fire-and-forget lookup; updates the doc when done
      lookupCompany(input).then(async (info) => {
        const patch = { lookupStatus: "done", updatedAt: serverTimestamp() };
        if (info.name) patch.company = info.name;
        if (info.logoUrl) patch.logoUrl = info.logoUrl;
        if (info.description) patch.description = info.description;
        if (info.phone) patch.phone = info.phone;
        if (info.email) patch.email = info.email;
        if (info.address) patch.address = info.address;
        try { await updateDoc(doc(db, "bills", ref.id), patch); } catch (e) {}
      }).catch(() => {
        try { updateDoc(doc(db, "bills", ref.id), { lookupStatus: "failed" }); } catch (e) {}
      });
    }
  } catch (e) {
    toast("Add bill failed: " + e.message, true);
  }
}

async function updateBill(id, patch) {
  try {
    await updateDoc(doc(db, "bills", id), { ...patch, updatedAt: serverTimestamp() });
  } catch (e) { toast("Update failed: " + e.message, true); }
}
async function deleteBill(b) {
  if (!confirm(`Delete "${b.company}"?`)) return;
  try { await deleteDoc(doc(db, "bills", b.id)); toast("Deleted"); }
  catch (e) { toast("Delete failed: " + e.message, true); }
}
async function markBillPaid(b) {
  // Mark current as paid + (if recurring) create next month's instance
  try {
    await updateBill(b.id, { status: "paid", paidAt: new Date().toISOString().slice(0, 10) });
    if (b.frequency && b.frequency !== "once") {
      const next = { ...b };
      delete next.id;
      next.status = "open";
      next.paidAt = "";
      next.dueDate = advanceDate(b.dueDate, b.frequency);
      next.createdAt = serverTimestamp();
      next.updatedAt = serverTimestamp();
      await addDoc(collection(db, "bills"), next);
      toast("Marked paid — next " + b.frequency + " bill created");
    } else {
      toast("Marked paid");
    }
  } catch (e) { toast("Mark paid failed: " + e.message, true); }
}
async function reopenBill(b) {
  await updateBill(b.id, { status: "open", paidAt: "" });
}

// ----- Filtering -----
function filterBills() {
  const today = todayISO();
  const monthEnd = lastDayOfMonth();
  const in30 = addDaysISO(30);
  if (currentBillFilter === "month") {
    return bills.filter(b => b.status !== "paid" && (!b.dueDate || b.dueDate <= monthEnd));
  }
  if (currentBillFilter === "upcoming") {
    return bills.filter(b => b.status !== "paid" && b.dueDate && b.dueDate > monthEnd && b.dueDate <= in30);
  }
  if (currentBillFilter === "all") {
    return bills.filter(b => b.status !== "paid");
  }
  if (currentBillFilter === "paid") {
    return bills.filter(b => b.status === "paid");
  }
  return bills;
}

// ----- Bills render -----
function renderBills() {
  const list = filterBills();
  const root = $("#bills-list");
  if (list.length === 0) {
    const empty = {
      month: { e: "💸", m: "No bills due this month." },
      upcoming: { e: "📅", m: "Nothing coming up." },
      all: { e: "🎉", m: "No open bills. Add one above." },
      paid: { e: "✅", m: "No paid bills yet." }
    }[currentBillFilter];
    root.innerHTML = `<div class="empty-state"><div class="emoji">${empty.e}</div><div>${empty.m}</div></div>`;
    return;
  }
  // Sort by due date asc, no-due last
  const sorted = [...list].sort((a, b) => {
    if (!a.dueDate) return 1;
    if (!b.dueDate) return -1;
    return a.dueDate.localeCompare(b.dueDate);
  });
  root.innerHTML = sorted.map(billHtml).join("");
  sorted.forEach(b => bindBillEvents(b));
}

function billHtml(b) {

  const isPaid = b.status === "paid";

  const freqLabel = ({ monthly: "/mo", quarterly: "/qtr", yearly: "/yr", weekly: "/wk", once: "" })[b.frequency] || "";
  const cat = billCategories.find(c => c.name === b.category);
  const catChip = cat ? `<span class="chip-cat">${cat.emoji} ${escapeHtml(cat.name)}</span>` : (b.category ? `<span class="chip-cat">${escapeHtml(b.category)}</span>` : "");
  const lookupSpinner = b.lookupStatus === "pending" ? `<span class="lookup-spinner" title="Looking up info…"></span>` : "";
  let dueText = "";
  if (b.dueDate) {
    const cls = overdue ? "deadline-overdue" : (b.dueDate === today ? "deadline-warning" : "");
    dueText = `<span class="${cls}">📅 ${fmtDate(b.dueDate)}${overdue ? " · overdue" : ""}</span>`;
  } else if (isPaid && b.paidAt) {

    ? `<div class="bill-logo"><img src="${escapeHtml(b.logoUrl)}" alt="" onerror="this.parentElement.innerHTML='💵'"/></div>`
    : `<div class="bill-logo">💵</div>`;
  return `
    <div class="bill ${isExpanded ? 'expanded' : ''} ${isPaid ? 'paid' : ''}" data-bill-id="${b.id}">

function bindBillEvents(b) {
  const root = document.querySelector(`.bill[data-bill-id="${b.id}"]`);
  if (!root) return;
  root.querySelectorAll("[data-action]").forEach(el => {
    const action = el.dataset.action;
    if (action === "expand") el.onclick = () => { expandedBillId = expandedBillId === b.id ? null : b.id; render(); };
    if (action === "collapse") el.onclick = () => { expandedBillId = null; render(); };
    if (action === "toggle-paid") el.onclick = (e) => {
      e.stopPropagation();
      if (b.status === "paid") reopenBill(b); else markBillPaid(b);
    };
    if (action === "delete") el.onclick = () => deleteBill(b);
    if (action === "edit-company") el.onchange = () => updateBill(b.id, { company: el.value });
    if (action === "edit-url") el.onchange = () => {
      const url = el.value.trim();
      const domain = extractDomain(url);
      updateBill(b.id, { url, domain, logoUrl: domain ? ("https://logo.clearbit.com/" + domain) : "" });
    };
    if (action === "edit-amount") el.onchange = () => updateBill(b.id, { amount: parseFloat(el.value) || 0 });
    if (action === "edit-frequency") el.onchange = () => updateBill(b.id, { frequency: el.value });
    if (action === "edit-due") el.onchange = () => updateBill(b.id, { dueDate: el.value || null });
    if (action === "edit-category") el.onchange = () => updateBill(b.id, { category: el.value });
    if (action === "edit-description") el.onblur = () => updateBill(b.id, { description: el.value });
    if (action === "edit-account") el.onchange = () => updateBill(b.id, { accountNumber: el.value });
    if (action === "edit-phone") el.onchange = () => updateBill(b.id, { phone: el.value });
    if (action === "edit-email") el.onchange = () => updateBill(b.id, { email: el.value });
    if (action === "edit-address") el.onchange = () => updateBill(b.id, { address: el.value });
    if (action === "edit-notes") el.onblur = () => updateBill(b.id, { notes: el.value });
    if (action === "refetch") el.onclick = async () => {
      if (!b.url) return toast("No URL on this bill", true);
      await updateBill(b.id, { lookupStatus: "pending" });
      const info = await lookupCompany(b.url);
      const patch = { lookupStatus: "done" };
      if (info.logoUrl) patch.logoUrl = info.logoUrl;
      if (info.name && !b.company) patch.company = info.name;
      if (info.description && !b.description) patch.description = info.description;
      if (info.phone && !b.phone) patch.phone = info.phone;
      if (info.email && !b.email) patch.email = info.email;
      if (info.address && !b.address) patch.address = info.address;
      await updateBill(b.id, patch);
      toast("Re-fetched");
    };

    // Links
    if (action === "edit-link-label") el.onchange = () => {
      const i = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = [...(b.links || [])]; links[i] = { ...links[i], label: el.value };
      updateBill(b.id, { links });
    };
    if (action === "edit-link-url") el.onchange = () => {
      const i = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = [...(b.links || [])]; links[i] = { ...links[i], url: el.value };
      updateBill(b.id, { links });
    };
    if (action === "del-link") el.onclick = () => {
      const i = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      updateBill(b.id, { links: (b.links || []).filter((_, idx) => idx !== i) });
    };
    if (action === "add-link") el.onclick = () => updateBill(b.id, { links: [...(b.links || []), { label: "", url: "" }] });

    // Files (Obsidian)
    if (action === "edit-file-name") el.onchange = () => {
      const i = parseInt(el.closest("[data-file-idx]").dataset.fileIdx);
      const files = [...(b.files || [])]; files[i] = { ...files[i], name: el.value };
      updateBill(b.id, { files });
    };
    if (action === "edit-file-url") el.onchange = () => {
      const i = parseInt(el.closest("[data-file-idx]").dataset.fileIdx);
      const files = [...(b.files || [])]; files[i] = { ...files[i], url: el.value };
      updateBill(b.id, { files });
    };
    if (action === "del-file") el.onclick = () => {
      const i = parseInt(el.closest("[data-file-idx]").dataset.fileIdx);
      updateBill(b.id, { files: (b.files || []).filter((_, idx) => idx !== i) });
    };
    if (action === "add-file") el.onclick = () => updateBill(b.id, { files: [...(b.files || []), { name: "", url: "" }] });
  });
}

        <button class="icon-btn danger" data-bcat-action="delete">×</button>
      </div>
    `).join("");
  root.innerHTML = `
    <div class="settings-section">
      <h2>Bill Categories</h2>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">
        Categories for bills. Separate from your task categories.
      </div>
      ${catsHtml}
      <div class="cat-row" style="border-top:1px solid var(--panel-border);margin-top:10px;padding-top:14px">
        <input class="cat-emoji-input" type="text" placeholder="📁" id="new-bcat-emoji" maxlength="4" />
        <input type="text" placeholder="New category name" id="new-bcat-name" />
        <button class="btn primary" id="add-bcat-btn">Add</button>
      </div>
    </div>
    <div class="settings-section">
      <h2>How To-Pay works</h2>
      <p style="margin:0;color:var(--text-dim);font-size:13px;line-height:1.6">
        Paste a company URL (e.g. <code style="background:var(--panel-2);padding:1px 5px;border-radius:3px">netflix.com</code>) and the app auto-pulls the logo, plus best-effort phone / email / address from the website. Set the amount, due date, and frequency. When you mark a recurring bill paid, the next instance auto-creates with the next due date.
      </p>
    </div>
  `;
  root.querySelectorAll("[data-bcat-id]").forEach(row => {
    const id = row.dataset.bcatId;
    const c = billCategories.find(x => x.id === id);
    row.querySelectorAll("[data-bcat-action]").forEach(el => {
      const action = el.dataset.bcatAction;
      if (action === "emoji") el.onchange = () => updateDoc(doc(db, "bill_categories", id), { emoji: el.value });
      if (action === "name") el.onchange = () => updateDoc(doc(db, "bill_categories", id), { name: el.value });
      if (action === "delete") el.onclick = async () => {
        if (!confirm(`Delete category "${c.name}"?`)) return;
        await deleteDoc(doc(db, "bill_categories", id));
      };
    });
  });
  $("#add-bcat-btn").onclick = async () => {
    const emoji = $("#new-bcat-emoji").value.trim() || "📁";
    const name = $("#new-bcat-name").value.trim();
    if (!name) return toast("Name required", true);
    await addDoc(collection(db, "bill_categories"), { name, emoji, parentId: null });
    $("#new-bcat-name").value = ""; $("#new-bcat-emoji").value = "";
  };
}

// ----- Tabs + quick add + mode switcher -----

// To-Do tabs (scoped to #tabs only — NOT #bill-tabs)
$("#tabs").querySelectorAll("button").forEach(btn => {
  btn.onclick = () => {
    $("#tabs").querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    expandedId = null;
    render();
  };
});

// Bills tabs
$("#bill-tabs").querySelectorAll("button").forEach(btn => {
  btn.onclick = () => {
    $("#bill-tabs").querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentBillFilter = btn.dataset.billFilter;
    expandedBillId = null;
    render();
  };
});

// Mode switcher
$("#mode-switch").querySelectorAll("button").forEach(btn => {
  btn.onclick = () => {
    $("#mode-switch").querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
    localStorage.setItem("td-mode", mode);
    render();
  };
});

// Restore mode button state from saved mode
$("#mode-switch").querySelectorAll("button").forEach(b => {
  b.classList.toggle("active", b.dataset.mode === mode);
});

$("#qa-add").onclick = () => { addTask($("#qa-title").value); $("#qa-title").value = ""; };
$("#qa-title").onkeydown = (e) => { if (e.key === "Enter") $("#qa-add").click(); };

$("#bill-qa-add").onclick = () => { addBillFromInput($("#bill-qa-url").value); $("#bill-qa-url").value = ""; };
$("#bill-qa-url").onkeydown = (e) => { if (e.key === "Enter") $("#bill-qa-add").click(); };

// Initial render (empty state until data arrives)
render();

// Register service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js").catch(()=>{});
}
</script>
</body>
</html>
